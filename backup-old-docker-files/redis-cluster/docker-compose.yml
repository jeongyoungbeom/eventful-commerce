version: "3.8"

services:
  # --cluster-enabled yes: 클러스터 모드 활성화
  # --cluster-config-file nodes.conf: 클러스터 노드 정보 저장 파일
  # --cluster-node-timeout 5000: 5초 동안 응답 없으면 장애로 판단
  # --appendonly yes: 데이터 영속성 (재시작 시 복구)
  redis-node-1:
    image: redis:7-alpine
    container_name: redis-node-1
    ports:
      - "7001:7001"
    command: >
      redis-server
      --port 7001
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --cluster-announce-ip 127.0.0.1
      --cluster-announce-port 7001
    volumes:
      - redis-node-1-data:/data
    networks:
      - redis-cluster-net

  redis-node-2:
    image: redis:7-alpine
    container_name: redis-node-2
