version: "3.8"

services:
  # ========================================
  # PostgreSQL - 모든 서비스가 사용하는 메인 DB
  # ========================================
  postgres:
    image: postgres:16-alpine
    container_name: eventful-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eventful-network

  # ========================================
  # Redis Cluster (6노드: 3마스터 + 3레플리카)
  # ========================================
  # --bind 0.0.0.0 -> 컨테이너 내부 루프백만이 아니라 모든 인터페이스에서 요청을 받게 합니다.
  # --protected-mode no -> Redis는 기본적으로 보안상 외부 접속을 막는 성향이 있는데, 지금은 로컬 개발 환경에서 Docker를 통해 외부 연결을 받아야 하므로 껐습니다.
  # --appendonly yes -> Redis 재시작 시 데이터가 남도록 하기 위해 넣었습니다.
  # --cluster-announce-hostname redis-cluster.local -> 로컬 IntelliJ JVM은 redis-node-1 을 못 풉니다 하지만 redis-cluster.local 은 /etc/hosts 로 풀 수 있습니다

  # 이건 컨테이너 안에서 redis-cluster.local 을 어떤 IP로 볼지 강제로 지정하는 겁니다.
  # 여기서 host-gateway 는 Docker host gateway 를 뜻합니다.
  # 컨테이너 안에서도 redis-cluster.local 이 해석되어야 하고
  # 그 해석 결과가 호스트 경유 포트 로 이어져야 하기 때문입니다.
  # 즉:
  # 로컬 WSL: redis-cluster.local -> 127.0.0.1
  # Redis 컨테이너: redis-cluster.local -> host-gateway
  # 둘 다 같은 이름을 쓰지만, 각 환경에서 알맞게 해석되도록 만든 겁니다.
  redis-node-1:
    image: redis:7-alpine
    container_name: redis-node-1
    command: >
      redis-server
      --bind 0.0.0.0
      --protected-mode no
      --port 7001
      --cluster-enabled yes
      --cluster-config-file /data/nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --cluster-announce-hostname redis-cluster.local
      --cluster-preferred-endpoint-type hostname
      --cluster-announce-port 7001
      --cluster-announce-bus-port 17001
    ports:
      - "7001:7001"
      - "17001:17001"
    extra_hosts:
      - "redis-cluster.local:host-gateway"
    volumes:
      - redis-node-1-data:/data
    networks: [eventful-network]

  redis-node-2:
    image: redis:7-alpine
    container_name: redis-node-2
    command: >
      redis-server
      --bind 0.0.0.0
      --protected-mode no
      --port 7002
      --cluster-enabled yes
      --cluster-config-file /data/nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --cluster-announce-hostname redis-cluster.local
      --cluster-preferred-endpoint-type hostname
      --cluster-announce-port 7002
      --cluster-announce-bus-port 17002
    ports:
      - "7002:7002"
      - "17002:17002"
    extra_hosts:
      - "redis-cluster.local:host-gateway"
    volumes:
      - redis-node-2-data:/data
    networks: [eventful-network]

  redis-node-3:
    image: redis:7-alpine
    container_name: redis-node-3
    command: >
      redis-server
      --bind 0.0.0.0
      --protected-mode no
      --port 7003
      --cluster-enabled yes
      --cluster-config-file /data/nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --cluster-announce-hostname redis-cluster.local
      --cluster-preferred-endpoint-type hostname
      --cluster-announce-port 7003
      --cluster-announce-bus-port 17003
    ports:
      - "7003:7003"
      - "17003:17003"
    extra_hosts:
      - "redis-cluster.local:host-gateway"
    volumes:
      - redis-node-3-data:/data
    networks: [eventful-network]

  redis-node-4:
    image: redis:7-alpine
    container_name: redis-node-4
    command: >
      redis-server
      --bind 0.0.0.0
      --protected-mode no
      --port 7004
      --cluster-enabled yes
      --cluster-config-file /data/nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --cluster-announce-hostname redis-cluster.local
      --cluster-preferred-endpoint-type hostname
      --cluster-announce-port 7004
      --cluster-announce-bus-port 17004
    ports:
      - "7004:7004"
      - "17004:17004"
    extra_hosts:
      - "redis-cluster.local:host-gateway"
    volumes:
      - redis-node-4-data:/data
    networks: [eventful-network]

  redis-node-5:
    image: redis:7-alpine
    container_name: redis-node-5
    command: >
      redis-server
      --bind 0.0.0.0
      --protected-mode no
      --port 7005
      --cluster-enabled yes
      --cluster-config-file /data/nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --cluster-announce-hostname redis-cluster.local
      --cluster-preferred-endpoint-type hostname
      --cluster-announce-port 7005
      --cluster-announce-bus-port 17005
    ports:
      - "7005:7005"
      - "17005:17005"
    extra_hosts:
      - "redis-cluster.local:host-gateway"
    volumes:
      - redis-node-5-data:/data
    networks: [eventful-network]

  redis-node-6:
    image: redis:7-alpine
    container_name: redis-node-6
    command: >
      redis-server
      --bind 0.0.0.0
      --protected-mode no
      --port 7006
      --cluster-enabled yes
      --cluster-config-file /data/nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --cluster-announce-hostname redis-cluster.local
      --cluster-preferred-endpoint-type hostname
      --cluster-announce-port 7006
      --cluster-announce-bus-port 17006
    ports:
      - "7006:7006"
      - "17006:17006"
    extra_hosts:
      - "redis-cluster.local:host-gateway"
    volumes:
      - redis-node-6-data:/data
    networks: [eventful-network]

  # ========================================
  # Kafka (KRaft 모드, ZooKeeper 없음)
  # ========================================
  kafka:
    image: apache/kafka:3.7.0
    container_name: eventful-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - eventful-network

volumes:
  postgres_data:
  redis-node-1-data:
  redis-node-2-data:
  redis-node-3-data:
  redis-node-4-data:
  redis-node-5-data:
  redis-node-6-data:

networks:
  eventful-network:
    driver: bridge
