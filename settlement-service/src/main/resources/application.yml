server:
  port: 8087

spring:
  profiles:
    default: dev
  application:
    name: settlement-service

  datasource:
    url: jdbc:postgresql://localhost:5432/settlement_service
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      group-id: settlement-service-group
      auto-offset-reset: earliest

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

jwt:
  secret: ${JWT_SECRET:}

settlement:
  platform-fee-rate: 0.10
  batch-cron: "0 0 0 * * *"

management:
  endpoints:
    web:
      exposure:
        include: health,info

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/settlement_service
  kafka:
    bootstrap-servers: kafka:9092

jwt:
  secret: ${JWT_SECRET}
