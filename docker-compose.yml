version: "3.8"

services:
  # ========================================
  # PostgreSQL - 모든 서비스가 사용하는 메인 DB
  # ========================================
  postgres:
    image: postgres:16-alpine
    container_name: eventful-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eventful-network

  # ========================================
  # Redis Cluster (6노드: 3마스터 + 3레플리카)
  # ========================================
  redis-node-1:
    image: redis:7-alpine
    container_name: redis-node-1
    command: >
      redis-server
      --bind 0.0.0.0
      --protected-mode no
      --port 7001
      --cluster-enabled yes
      --cluster-config-file /data/nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --cluster-announce-hostname redis-node-1
      --cluster-preferred-endpoint-type hostname
      --cluster-announce-port 7001
      --cluster-announce-bus-port 17001
    ports:
      - "7001:7001"
      - "17001:17001"
    volumes:
      - redis-node-1-data:/data
    networks:
      eventful-network:
        ipv4_address: 172.20.0.11

  redis-node-2:
    image: redis:7-alpine
    container_name: redis-node-2
    command: >
      redis-server
      --bind 0.0.0.0
      --protected-mode no
      --port 7002
      --cluster-enabled yes
      --cluster-config-file /data/nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --cluster-announce-hostname redis-node-2
      --cluster-preferred-endpoint-type hostname
      --cluster-announce-port 7002
      --cluster-announce-bus-port 17002
    ports:
      - "7002:7002"
      - "17002:17002"
    volumes:
      - redis-node-2-data:/data
    networks:
      eventful-network:
        ipv4_address: 172.20.0.12

  redis-node-3:
    image: redis:7-alpine
    container_name: redis-node-3
    command: >
      redis-server
      --bind 0.0.0.0
      --protected-mode no
      --port 7003
      --cluster-enabled yes
      --cluster-config-file /data/nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --cluster-announce-hostname redis-node-3
      --cluster-preferred-endpoint-type hostname
      --cluster-announce-port 7003
      --cluster-announce-bus-port 17003
    ports:
      - "7003:7003"
      - "17003:17003"
    volumes:
      - redis-node-3-data:/data
    networks:
      eventful-network:
        ipv4_address: 172.20.0.13

  redis-node-4:
    image: redis:7-alpine
    container_name: redis-node-4
    command: >
      redis-server
      --bind 0.0.0.0
      --protected-mode no
      --port 7004
      --cluster-enabled yes
      --cluster-config-file /data/nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --cluster-announce-hostname redis-node-4
      --cluster-preferred-endpoint-type hostname
      --cluster-announce-port 7004
      --cluster-announce-bus-port 17004
    ports:
      - "7004:7004"
      - "17004:17004"
    volumes:
      - redis-node-4-data:/data
    networks:
      eventful-network:
        ipv4_address: 172.20.0.14

  redis-node-5:
    image: redis:7-alpine
    container_name: redis-node-5
    command: >
      redis-server
      --bind 0.0.0.0
      --protected-mode no
      --port 7005
      --cluster-enabled yes
      --cluster-config-file /data/nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --cluster-announce-hostname redis-node-5
      --cluster-preferred-endpoint-type hostname
      --cluster-announce-port 7005
      --cluster-announce-bus-port 17005
    ports:
      - "7005:7005"
      - "17005:17005"
    volumes:
      - redis-node-5-data:/data
    networks:
      eventful-network:
        ipv4_address: 172.20.0.15

  redis-node-6:
    image: redis:7-alpine
    container_name: redis-node-6
    command: >
      redis-server
      --bind 0.0.0.0
      --protected-mode no
      --port 7006
      --cluster-enabled yes
      --cluster-config-file /data/nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --cluster-announce-hostname redis-node-6
      --cluster-preferred-endpoint-type hostname
      --cluster-announce-port 7006
      --cluster-announce-bus-port 17006
    ports:
      - "7006:7006"
      - "17006:17006"
    volumes:
      - redis-node-6-data:/data
    networks:
      eventful-network:
        ipv4_address: 172.20.0.16

  # ========================================
  # Kafka (KRaft 모드, ZooKeeper 없음)
  # ========================================
  kafka:
    image: apache/kafka:3.7.0
    container_name: eventful-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 9092 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - eventful-network

  # ========================================
  # Application Services
  # ========================================

  api-gateway:
    image: jybeomss1/api-gateway:latest
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
    depends_on:
      redis-node-1:
        condition: service_started
      redis-node-2:
        condition: service_started
      redis-node-3:
        condition: service_started
      redis-node-4:
        condition: service_started
      redis-node-5:
        condition: service_started
      redis-node-6:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - eventful-network
    restart: always

  order-service:
    image: jybeomss1/order-service:latest
    container_name: order-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis-node-1:
        condition: service_started
      redis-node-2:
        condition: service_started
      redis-node-3:
        condition: service_started
      redis-node-4:
        condition: service_started
      redis-node-5:
        condition: service_started
      redis-node-6:
        condition: service_started
    networks:
      - eventful-network
    restart: on-failure

  payment-service:
    image: jybeomss1/payment-service:latest
    container_name: payment-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - eventful-network
    restart: on-failure

  shipping-service:
    image: jybeomss1/shipping-service:latest
    container_name: shipping-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - eventful-network
    restart: on-failure

  notification-service:
    image: jybeomss1/notification-service:latest
    container_name: notification-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-your-bot-token-here}
      - TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME:-eventful_commerce_bot}
      - TELEGRAM_DEFAULT_USER_ID=${TELEGRAM_DEFAULT_USER_ID:-}
      - TELEGRAM_DEFAULT_CHAT_ID=${TELEGRAM_DEFAULT_CHAT_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - eventful-network
    restart: on-failure

  user-service:
    image: jybeomss1/user-service:latest
    container_name: user-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      # REQUIRED: JWT secret must be provided via environment variable
      # DO NOT use default values in production!
      # Generate with: openssl rand -base64 64
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET environment variable is required}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis-node-1:
        condition: service_started
      redis-node-2:
        condition: service_started
      redis-node-3:
        condition: service_started
      redis-node-4:
        condition: service_started
      redis-node-5:
        condition: service_started
      redis-node-6:
        condition: service_started
    networks:
      - eventful-network
    restart: on-failure

  product-service:
    image: jybeomss1/product-service:latest
    container_name: product-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - eventful-network
    restart: on-failure

  settlement-service:
    image: jybeomss1/settlement-service:latest
    container_name: settlement-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - SETTLEMENT_PLATFORM_FEE_RATE=${SETTLEMENT_PLATFORM_FEE_RATE:-0.10}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - eventful-network
    restart: on-failure

volumes:
  postgres_data:
  redis-node-1-data:
  redis-node-2-data:
  redis-node-3-data:
  redis-node-4-data:
  redis-node-5-data:
  redis-node-6-data:

networks:
  eventful-network:
    driver: bridge
    driver_opts:
      com.docker.network.enable_ipv4: "true"
      com.docker.network.enable_ipv6: "false"
    ipam:
      config:
        - subnet: 172.20.0.0/16
