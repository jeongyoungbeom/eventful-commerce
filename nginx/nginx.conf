events {
    worker_connections 1024;
}

http {
    upstream api_gateway {
        server api-gateway:8080;
    }

    # CORS 설정을 위한 map
    map $http_origin $cors_origin {
        default "";
        "~^http://localhost:3000$" $http_origin;
        "~^http://localhost:3002$" $http_origin;
        "~^http://1\.243\.252\.60:3000$" $http_origin;
        "~^http://1\.243\.252\.60:3002$" $http_origin;
    }

    server {
        listen 80;
        server_name _;

        location /images/ {
            alias /images/;
            access_log off;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000" always;
        }

        location / {
            # CORS 헤더 추가
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With, X-Client' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' '3600' always;

            # OPTIONS 요청 (preflight) 처리
            if ($request_method = 'OPTIONS') {
                return 204;
            }

            # upstream CORS 헤더 제거 (nginx에서 직접 추가하므로 중복 방지)
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Access-Control-Max-Age;

            proxy_pass http://api_gateway;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }
    }
}
